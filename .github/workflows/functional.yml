# Functional — start app directly (not via compose), run acceptance tests
# In-memory backend: no postgres/redis/alembic needed.
---
name: Functional

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * *"

env:
  DATABASE_URL: ""
  REDIS_URL: ""

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -e '.[dev]'
      - name: Start app
        run: |
          uvicorn src.rate_limiter.main:create_app --factory --host 0.0.0.0 --port 8000 &
          sleep 2
      - name: Wait for /healthz
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/healthz >/dev/null 2>&1; then
              echo "App ready"
              exit 0
            fi
            sleep 2
          done
          echo "App not ready after 30s"
          exit 1
      - name: Run acceptance tests
        run: API_BASE_URL=http://localhost:8000 pytest verify/acceptance/ -v
